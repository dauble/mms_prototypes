title: "Marcia Mount Shoop — Site Prototypes"
tagline: Author, theologian, and speaker on embodiment, trauma, and healing
description: >-
  Internal prototype hub for the marciamountshoop.com redesign. Not the
  live site — for client review of design directions only.
url: "https://davidauble.com"
baseurl: "/mms_prototypes"
lang: en_US
locale: en_US
author:
  name: Marcia Mount Shoop

social_links:
  facebook: "https://facebook.com/"
  instagram: "https://instagram.com/"
  x: "https://x.com/"
  youtube: "https://youtube.com/"
  substack: "https://marciamountshoop.substack.com/"

affiliate_disclosure: >-
  As an Amazon Associate and Bookshop.org affiliate, Marcia earns from
  qualifying purchases.

# jekyll-seo-tag / jekyll-sitemap read these
twitter:
  card: summary_large_image
  username: ""
social:
  name: Marcia Mount Shoop
  links:
    - "https://facebook.com/"
    - "https://instagram.com/"
    - "https://x.com/"
    - "https://youtube.com/"

collections:
  books_3a:
    output: true
    permalink: /options/3a/books/:path/
  writing_3a:
    output: true
    permalink: /options/3a/writing-and-talks/:path/
  books_1a:
    output: true
    permalink: /options/1a/books/:path/
  writing_1a:
    output: true
    permalink: /options/1a/writing-and-talks/:path/
  books_2a:
    output: true
    permalink: /options/2a/books/:path/
  writing_2a:
    output: true
    permalink: /options/2a/writing-and-talks/:path/

defaults:
  - scope:
      path: "options/3a"
      type: "pages"
    values:
      layout: "default-3a"
      variant: "3a"
  - scope:
      path: ""
      type: "books_3a"
    values:
      layout: "book-3a"
      variant: "3a"
  - scope:
      path: ""
      type: "writing_3a"
    values:
      layout: "writing-entry-3a"
      variant: "3a"
  - scope:
      path: "options/1a"
      type: "pages"
    values:
      layout: "default-1a"
      variant: "1a"
  - scope:
      path: ""
      type: "books_1a"
    values:
      layout: "book-1a"
      variant: "1a"
  - scope:
      path: ""
      type: "writing_1a"
    values:
      layout: "writing-entry-1a"
      variant: "1a"
  - scope:
      path: "options/2a"
      type: "pages"
    values:
      layout: "default-2a"
      variant: "2a"
  - scope:
      path: ""
      type: "books_2a"
    values:
      layout: "book-2a"
      variant: "2a"
  - scope:
      path: ""
      type: "writing_2a"
    values:
      layout: "writing-entry-2a"
      variant: "2a"

plugins:
  - jekyll-seo-tag
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
