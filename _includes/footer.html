<footer class="site-footer">
  <div class="site-footer__disclosure">
    {{ site.affiliate_disclosure }} &copy; {{ site.time | date: '%Y' }} {{ site.author.name }}.
  </div>
  <div class="site-footer__social">
    <a class="social-icon" href="{{ site.social_links.facebook }}" aria-label="Facebook">FB</a>
    <a class="social-icon" href="{{ site.social_links.instagram }}" aria-label="Instagram">IG</a>
    <a class="social-icon" href="{{ site.social_links.x }}" aria-label="X">X</a>
  </div>
</footer>
