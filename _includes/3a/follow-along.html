<section class="follow">
  <h2 class="follow__title">Follow Along</h2>
  <p class="follow__desc">Sermons on YouTube, reflections on Substack, and day-to-day on Instagram &amp; Facebook.</p>
  <div class="follow__links">
    <a class="follow__link" href="{{ site.social_links.facebook }}">Facebook &#8599;</a>
    <a class="follow__link" href="{{ site.social_links.instagram }}">Instagram &#8599;</a>
    <a class="follow__link" href="{{ site.social_links.x }}">X &#8599;</a>
    <a class="follow__link" href="{{ site.social_links.youtube }}">YouTube &#8599;</a>
    <a class="follow__link follow__link--substack" href="{{ site.social_links.substack }}">Substack &#8599;</a>
  </div>
  <form class="follow__form" action="https://marciamountshoop.substack.com/subscribe" method="get" target="_blank" rel="noopener">
    <input class="follow__input" type="email" name="email" placeholder="you@email.com" aria-label="Email address" required>
    <button class="btn btn-green" type="submit">Subscribe on Substack</button>
  </form>
  <div class="follow__note">Powered by Substack — confirms by email and delivers new posts straight to your inbox.</div>
</section>
