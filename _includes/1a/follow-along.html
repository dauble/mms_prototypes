<section class="follow-1a">
  <div class="follow-1a__head">
    <div class="follow-1a__eyebrow">Follow Along</div>
    <p class="follow-1a__desc">Updates, reflections, and sermons — wherever you already are.</p>
  </div>
  <div class="follow-1a__links">
    <a class="follow-1a__link follow-1a__link--primary" href="{{ site.social_links.substack }}">Substack</a>
    <a class="follow-1a__link" href="{{ site.social_links.instagram }}">Instagram @mountshoop</a>
    <a class="follow-1a__link" href="{{ site.social_links.facebook }}">Facebook</a>
    <a class="follow-1a__link" href="{{ site.social_links.youtube }}">YouTube &mdash; GCPC</a>
  </div>
  <form class="follow-1a__form" action="https://marciamountshoop.substack.com/subscribe" method="get" target="_blank" rel="noopener">
    <input class="follow-1a__input" type="email" name="email" placeholder="you@email.com" aria-label="Email address" required>
    <button class="btn-1a btn-1a-primary" type="submit">Subscribe</button>
  </form>
  <div class="follow-1a__note">Powered by Substack — confirms by email and delivers new posts straight to your inbox.</div>
</section>
