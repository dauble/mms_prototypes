<div class="breadcrumb-1a"><a href="{{ '/options/1a/writing-and-talks/' | relative_url }}">Writing &amp; Talks</a> / {{ page.title }}</div>

<section class="section-1a wrap" style="max-width:760px">

  <div class="talk-card-1a__meta" style="margin-bottom:26px">{{ page.meta }}</div>
  <div class="prose-1a">{{ content }}</div>
</section>
